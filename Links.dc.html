<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/oh-belmans-design-system-640dedbc-be0a-4a67-8f48-ec1dd674e8cf/tokens/fonts.css">
<link rel="stylesheet" href="_ds/oh-belmans-design-system-640dedbc-be0a-4a67-8f48-ec1dd674e8cf/tokens/colors.css">
<link rel="stylesheet" href="_ds/oh-belmans-design-system-640dedbc-be0a-4a67-8f48-ec1dd674e8cf/tokens/typography.css">
<link rel="stylesheet" href="_ds/oh-belmans-design-system-640dedbc-be0a-4a67-8f48-ec1dd674e8cf/tokens/radius.css">
<script src="_ds/oh-belmans-design-system-640dedbc-be0a-4a67-8f48-ec1dd674e8cf/_ds_bundle.js"></script>
<style>
  *{box-sizing:border-box}
  html,body{margin:0;background:#06192E}
  body{font-family:Inter,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
  .app{max-width:460px;margin:0 auto;min-height:100vh;background:url('assets/fireworks-bg.svg') center top / cover fixed no-repeat;background-color:#06192E;position:relative;box-shadow:0 0 60px rgba(0,0,0,.5)}
  ::-webkit-scrollbar{width:0}
  @keyframes menuIn{from{opacity:0}to{opacity:1}}
  @keyframes sheetIn{from{transform:translateY(-8px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</helmet>

<div class="app">

  <!-- App bar -->
  <div style="position:sticky;top:0;z-index:30;background:rgba(7,24,44,.8);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px">
    <button onClick="{{ toggleMenu }}" aria-label="Menu" style="width:42px;height:42px;border-radius:50%;border:none;background:rgba(239,242,247,.1);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#EFF2F7" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>
    <div style="font-size:14px;font-weight:600;color:#EFF2F7">Links</div>
    <a href="Home.dc.html" aria-label="Home" style="width:42px;height:42px;border-radius:50%;background:rgba(239,242,247,.1);display:flex;align-items:center;justify-content:center;text-decoration:none">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#EFF2F7" stroke-width="2" stroke-linecap="round"><path d="M3 11l9-8 9 8M5 9.5V21h14V9.5"/></svg>
    </a>
  </div>

  <div style="padding-bottom:48px">

    <div style="padding:14px 20px 4px">
      <div style="font-size:13px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:#AEB7C9">Everything in one place</div>
      <div style="font-size:40px;font-weight:500;letter-spacing:-1.5px;color:#EFF2F7;margin-top:4px">Links</div>
      <div style="font-size:14px;color:#C3CAD6;margin-top:8px;line-height:1.5">Menus, maps and resort info — all the pages worth bookmarking before we go.</div>
    </div>

    <sc-for list="{{ sections }}" as="sec" hint-placeholder-count="3">
      <div style="padding:24px 20px 4px"><div style="font-size:13px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:#AEB7C9">{{ sec.label }}</div></div>
      <div style="padding:0 16px;display:flex;flex-direction:column;gap:10px">
        <sc-for list="{{ sec.links }}" as="lk" hint-placeholder-count="2">
          <a href="{{ lk.href }}" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:14px;background:#0C2E4F;border:1px solid rgba(174,183,201,.16);border-radius:16px;padding:15px 16px;text-decoration:none">
            <div style="width:44px;height:44px;flex-shrink:0;border-radius:12px;background: {{ lk.bg }};color: {{ lk.fg }};display:flex;align-items:center;justify-content:center;font-size:20px">{{ lk.icon }}</div>
            <div style="flex:1;min-width:0">
              <div style="font-size:16px;font-weight:600;color:#EFF2F7">{{ lk.title }}</div>
              <div style="font-size:12px;color:#AEB7C9;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">{{ lk.sub }}</div>
            </div>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#62718A" stroke-width="2.2" stroke-linecap="round"><path d="M7 17L17 7M9 7h8v8"/></svg>
          </a>
        </sc-for>
      </div>
    </sc-for>

    <div style="margin:28px 16px 0;background:#0C3257;border-radius:18px;padding:18px 20px;display:flex;align-items:center;gap:14px">
      <div style="width:44px;height:44px;flex-shrink:0;border-radius:12px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M3 5a2 2 0 012-2h2.6a1 1 0 01.95.68l1.2 3.6a1 1 0 01-.27 1.05L8 11.5a13 13 0 005.5 5.5l1.17-1.48a1 1 0 011.05-.27l3.6 1.2a1 1 0 01.68.95V21a2 2 0 01-2 2A17 17 0 013 5z"/></svg>
      </div>
      <div style="flex:1">
        <div style="font-size:12px;color:rgba(255,255,255,.55);font-weight:600;letter-spacing:.5px;text-transform:uppercase">Resort front desk</div>
        <a href="tel:+14802935000" style="font-size:18px;font-weight:600;color:#fff;text-decoration:none">480.293.5000</a>
      </div>
    </div>

  </div>

  <!-- Menu overlay -->
  <sc-if value="{{ menuOpen }}" hint-placeholder-val="{{ false }}">
    <div style="position:fixed;inset:0;z-index:50;display:flex;justify-content:center">
      <div onClick="{{ closeMenu }}" style="position:absolute;inset:0;background:rgba(3,10,20,.55);animation:menuIn .18s ease"></div>
      <div style="position:relative;width:100%;max-width:460px;background:#071F38;animation:sheetIn .22s ease;display:flex;flex-direction:column;min-height:100vh">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 18px 8px">
          <div style="font-size:13px;font-weight:600;letter-spacing:1.3px;text-transform:uppercase;color:#AEB7C9">Belczak · O'Hara · Hillman</div>
          <button onClick="{{ closeMenu }}" aria-label="Close" style="width:42px;height:42px;border-radius:50%;border:none;background:rgba(239,242,247,.1);cursor:pointer;display:flex;align-items:center;justify-content:center">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#EFF2F7" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
          </button>
        </div>
        <div style="padding:14px 22px 0">
          <div style="font-size:44px;font-weight:500;letter-spacing:-1.8px;color:#EFF2F7;line-height:1.05">Desert Ridge<br>staycation</div>
          <div style="font-size:14px;color:#AEB7C9;margin-top:10px">July 2–5, 2026 · 3 families</div>
        </div>
        <nav style="margin-top:26px;display:flex;flex-direction:column">
          <sc-for list="{{ menuLinks }}" as="m" hint-placeholder-count="5">
            <a href="{{ m.href }}" style="display:flex;align-items:center;justify-content:space-between;padding:18px 22px;text-decoration:none;border-top:1px solid rgba(174,183,201,.16);color: {{ m.color }};">
              <span style="font-size:22px;font-weight:600;letter-spacing:-.4px">{{ m.label }}</span>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 6l6 6-6 6"/></svg>
            </a>
          </sc-for>
        </nav>
      </div>
    </div>
  </sc-if>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { menuOpen: false };

  renderVals() {
    const { menuOpen } = this.state;

    const sections = [
      { label: 'Dinner menus', links: [
        { title: 'Tía Carmen', sub: 'Modern Mexican · Thu dinner', icon: '🌮', bg: 'rgba(126,50,82,.24)', fg: '#D98AA6', href: 'https://www.tiacarmendesertridge.com/our-menus' },
        { title: 'Kembara', sub: 'Global street food · Fri dinner', icon: '🍜', bg: 'rgba(126,50,82,.24)', fg: '#D98AA6', href: 'https://www.kembaradesertridge.com/our-menus' },
      ]},
      { label: 'Maps & activities', links: [
        { title: 'Resort map', sub: 'Full property map · PDF', icon: '🗺️', bg: 'rgba(19,83,120,.28)', fg: '#79B6D6', href: 'https://ipoolside-media.s3.amazonaws.com/site/desertridge/images/attachment/JWDR_Resort_Map_Digital.pdf' },
        { title: 'Summer activity guide', sub: 'May 25 – Aug 9 · PDF', icon: '📋', bg: 'rgba(131,120,157,.3)', fg: '#B6ADC9', href: 'https://ipoolside-media.s3.amazonaws.com/site/desertridge/images/attachment/May_25-Aug_9_2026_Activity_Guide_Digital.pdf' },
        { title: 'Book an activity', sub: 'Reserve tie dye, build-a-buddy & more', icon: '📅', bg: 'rgba(26,115,157,.26)', fg: '#79B6D6', href: 'https://desertridge.ipoolside.com/services/hidden-do-not-activate/book_activities' },
      ]},
      { label: 'Resort', links: [
        { title: 'Desert Ridge website', sub: 'desertridgeresort.com', icon: '🏜️', bg: 'rgba(26,115,157,.26)', fg: '#79B6D6', href: 'https://www.marriott.com/en-us/hotels/phxdr-jw-marriott-phoenix-desert-ridge-resort-and-spa/overview/' },
      ]},
    ];

    const menuLinks = [
      { label: 'Home', href: 'Home.dc.html', color: '#EFF2F7' },
      { label: 'All Daily Activities', href: 'All%20Daily%20Activities.dc.html', color: '#EFF2F7' },
      { label: 'Resort Maps & Info', href: 'Resort%20Maps.dc.html', color: '#EFF2F7' },
      { label: 'Links', href: 'Links.dc.html', color: '#62718A' },
    ];

    return {
      menuOpen,
      toggleMenu: () => this.setState({ menuOpen: !menuOpen }),
      closeMenu: () => this.setState({ menuOpen: false }),
      sections, menuLinks,
    };
  }
}
</script>
</body>
</html>
